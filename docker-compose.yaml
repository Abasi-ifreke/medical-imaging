services:
  db:
    image: postgres:16-alpine
    container_name: med-db
    environment:
      POSTGRES_USER: meduser
      POSTGRES_PASSWORD: medpassword
      POSTGRES_DB: medical_imaging
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meduser -d medical_imaging"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  med-app:
    build: ./app
    container_name: med-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://meduser:medpassword@db:5432/medical_imaging
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MODEL_PATH=/app/pneumonia_model.h5
    volumes:
      - ./creds:/creds:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  med-frontend:
    build: ./frontend
    container_name: med-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://med-app:8000
    depends_on:
      - med-app
    restart: unless-stopped

  med-admin:
    build:
      context: ./frontend
      dockerfile: Dockerfile.admin
    container_name: med-admin
    ports:
      - "8502:8502"
    environment:
      - API_URL=http://med-app:8000
    depends_on:
      - med-app
    restart: unless-stopped

volumes:
  postgres_data:
